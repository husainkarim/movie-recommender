<section class="rating-page">
	<h1>Your Ratings</h1>
	<p class="subtitle">Rate each movie and update your ratings any time.</p>

	<div class="rating-list">
		@for (movie of movies; track movie.id) {
			<article class="rating-row">
				<div>
					<h2>{{ movie.title }}</h2>
					<p>{{ getGenres(movie) }}</p>
					<a [routerLink]="['/movies', movie.id]">Open details</a>
				</div>

				<div class="score-buttons">
					@for (rating of ratingOptions; track rating) {
						<button
							type="button"
							[class.active]="getUserRating(movie) === rating"
							(click)="setRating(movie.id, rating)"
						>
							{{ rating }}
						</button>
					}
				</div>
			</article>
		}
	</div>
</section>
