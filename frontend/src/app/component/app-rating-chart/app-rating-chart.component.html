<section class="rating-chart" aria-label="Vote distribution chart">
	<header class="rating-chart__header">
		<div>
			<p class="rating-chart__eyebrow">Votes</p>
			<h3>Rating breakdown</h3>
		</div>
		<p class="rating-chart__total">{{ totalVotes }} vote{{ totalVotes === 1 ? '' : 's' }}</p>
	</header>

	<div class="rating-chart__rows">
		@for (bucket of voteSummary; track bucket.rating) {
			<div class="rating-chart__row">
				<span class="rating-chart__label">{{ bucket.rating }} star{{ bucket.rating === 1 ? '' : 's' }}</span>
				<div class="rating-chart__track" aria-hidden="true">
					<div class="rating-chart__fill" [style.width.%]="bucket.percentage"></div>
				</div>
				<span class="rating-chart__count">{{ bucket.count }}</span>
			</div>
		}
	</div>
</section>
