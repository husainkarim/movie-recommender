<div class="app-shell">
	@if (isLoggedIn) {
		<header class="topbar">
			<a class="brand" routerLink="/home">Movie Recommender</a>
			<nav>
				<a routerLink="/" routerLinkActive="active">Home</a>
				<a routerLink="/ratings" routerLinkActive="active">Ratings</a>
				<a routerLink="/recommendations" routerLinkActive="active">Recommendations</a>
				<a routerLink="/watchlist" routerLinkActive="active">Watchlist</a>
			</nav>
			<div class="user-bar">
				<span>{{ email }}</span>
				<button type="button" (click)="logout()">Logout</button>
			</div>
		</header>
	}

	<main>
		<router-outlet></router-outlet>
	</main>
</div>
