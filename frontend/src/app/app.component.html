<div class="app-shell">
	@if (isLoading$ | async) {
		<div class="global-loading" role="status" aria-live="polite">
			<div class="global-loading__bar"></div>
			<span>Syncing with Neo4j graph data...</span>
		</div>
	}

	@if (isLoggedIn) {
		<header class="topbar">
			<a class="brand" routerLink="/">Movie Recommender</a>
			<nav>
				<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
				<a routerLink="/ratings" routerLinkActive="active">Ratings</a>
				<a routerLink="/recommendations" routerLinkActive="active">Recommendations</a>
				<a routerLink="/watchlist" routerLinkActive="active">Watchlist</a>
			</nav>
			<div class="user-bar">
				<span>{{ email }}</span>
				<button type="button" (click)="logout()">Logout</button>
			</div>
		</header>
	}

	<main>
		<router-outlet></router-outlet>
	</main>
</div>
